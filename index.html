<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve Stage 2 - Vadvilág Generátor</title>
    <!-- Google Fonts a sci-fi hatásért -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00ffcc; /* Szörny-nyomok fénye */
            --accent-color: #ff3333; /* Vadász lézer színe */
            --bg-dark: #0a1118;
            --bg-jungle: #162b22; /* Shear bolygó dzsungeles beütése */
        }

        body {
            /* Színátmenetes háttér */
            background: radial-gradient(circle at center, var(--bg-jungle) 0%, var(--bg-dark) 100%);
            color: #e2f0e8;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Hátteret díszítő animált "szkennelő" vonal */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 204, 0.15);
            box-shadow: 0 0 15px var(--primary-glow);
            animation: scanline 8s linear infinite;
            z-index: 0;
        }

        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        .container {
            /* Modern, holografikus adatlap (glassmorphism) */
            background: rgba(15, 25, 20, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 255, 204, 0.05);
            text-align: center;
            max-width: 550px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        /* Kis tech-sarkok a dizájn kedvéért */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-glow);
            opacity: 0.5;
        }
        .container::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .container::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.4);
        }

        #creature-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.8em;
            font-weight: 700;
            margin: 20px 0;
            color: var(--primary-glow);
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #creature-desc {
            font-size: 1.3em;
            margin-bottom: 25px;
            line-height: 1.6;
            min-height: 60px;
            color: #b0c4b8;
        }

        #creature-buff {
            font-size: 1.1em;
            color: #ffd700;
            margin-bottom: 35px;
            font-weight: 700;
            letter-spacing: 1px;
            border-left: 4px solid #ffd700;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.15) 0%, transparent 100%);
            padding: 12px 15px;
            text-align: left;
            display: inline-block;
            width: 80%;
        }

        button {
            /* Vágott sarkú cyberpunk gomb stílus */
            background: linear-gradient(45deg, transparent 10%, var(--accent-color) 10%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            box-shadow: 6px 0px 0px #00b38f;
            outline: none;
        }

        button:hover {
            background: linear-gradient(45deg, transparent 10%, #ff4d4d 10%);
            box-shadow: 6px 0px 0px var(--primary-glow);
            transform: translateX(-3px);
        }

        button:active {
            transform: translateX(3px);
            box-shadow: 0px 0px 0px var(--primary-glow);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Élőlény Generátor</h1>
        <div id="creature-name">Rendszer Készenlétben</div>
        <div id="creature-desc">Várakozás az indításra...</div>
        <div id="creature-buff">Nincs aktív buff</div>
        <button onclick="generateCreature()">Generálás Indítása</button>
    </div>

    <script>
        const creatures = [
            {
                name: "Tyrant",
                desc: "Hatalmas, krokodilszerű csúcsragadozó, amely a folyókban és mocsarakban rejtőzik.",
                buff: "Elit Buff: Folyamatos életerő regeneráció"
            },
            {
                name: "Megamouth",
                desc: "Félig a földbe ásva várja az áldozatát, kinézetre egy nagy sziklához hasonlít.",
                buff: "Elit Buff: Gyorsabb kasztképesség-töltődés"
            },
            {
                name: "Mammoth Bird",
                desc: "Nagy, madárszerű lény, amely veszély esetén elektromos mezőt hoz létre maga körül.",
                buff: "Elit Buff: Megnövelt fegyverváltási- és töltési sebesség"
            },
            {
                name: "Sloth",
                desc: "Hatalmas, kétlábú, majomszerű lény. Lassú, de óriásit sebez, ha felbosszantják.",
                buff: "Elit Buff: Extra sebzés kiosztása"
            },
            {
                name: "Trapjaw",
                desc: "Kutyaszerű, falkában vadászó ragadozók. Rendkívül gyorsak és agresszívek.",
                buff: "Könnyű Préda: Gyors táplálékszerzés a Szörny számára"
            },
            {
                name: "Armadon",
                desc: "Erősen páncélozott növényevő, amely a területét védi a betolakodóktól.",
                buff: "Elit Buff: Jelentős sebzéscsökkentés"
            },
            {
                name: "Nomad",
                desc: "Hatalmas, lassan mozgó növényevő, amely egyaránt bőséges prédája a Szörnynek.",
                buff: "Elit Buff: Gyorsabb Jetpack visszatöltődés a Vadászoknak"
            }
        ];

        function generateCreature() {
            const randomIndex = Math.floor(Math.random() * creatures.length);
            const selectedCreature = creatures[randomIndex];

            document.getElementById("creature-name").innerText = selectedCreature.name;
            document.getElementById("creature-desc").innerText = selectedCreature.desc;
            document.getElementById("creature-buff").innerText = selectedCreature.buff;
        }
    </script>
</body>
</html>
