<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve - Interaktív Térkép</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00ffcc;
            --accent-color: #ff3333;
            --bg-dark: #0a1118;
        }

        body {
            background-color: var(--bg-dark);
            color: #e2f0e8;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
            margin-bottom: 20px;
        }

        .controls {
            margin-bottom: 20px;
            z-index: 10;
        }

        button {
            background: linear-gradient(45deg, rgba(0, 255, 204, 0.1) 10%, var(--primary-glow) 10%);
            color: var(--bg-dark);
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 0px 0px #00997a;
            transition: all 0.2s ease;
        }

        button:hover {
            background: linear-gradient(45deg, rgba(0, 255, 204, 0.1) 10%, #33ffdb 10%);
            transform: translateX(-2px);
        }

        button:active {
            transform: translateX(2px);
            box-shadow: 0px 0px 0px transparent;
        }

        /* A térkép konténere */
        #map-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* A térkép maximális szélessége */
            border: 2px solid rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 255, 204, 0.1);
            overflow: hidden;
        }

        /* Maga a térkép kép */
        #base-map {
            width: 100%;
            height: auto;
            display: block;
        }

        /* A ráhelyezett ikonok stílusa */
        .food-icon {
            position: absolute;
            width: 35px; /* Ikon mérete - állíthatod ha túl nagy/kicsi */
            height: 35px;
            transform: translate(-50%, -50%); /* Hogy pontosan a koordinátán legyen a közepe */
            border-radius: 50%;
            box-shadow: 0 0 10px #00aaff, inset 0 0 5px #000;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 5;
        }

        .food-icon:hover {
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px var(--accent-color);
        }

    </style>
</head>
<body>

    <h1>Shear - Vadvilág Radar</h1>
    
    <div class="controls">
        <button onclick="spawnCreatures()">10 Élőlény Generálása</button>
    </div>

    <div id="map-container">
        <!-- A térképed -->
        <img src="Alap_map.jpg" id="base-map" alt="Shear Map">
        <!-- Ide kerülnek az ikonok JavaScript segítségével -->
        <div id="icon-layer"></div>
    </div>

    <script>
        // Néhány állat neve, hogy ha fölé viszed az egeret, kiírja
        const creatureNames = ["Tyrant", "Megamouth", "Mammoth Bird", "Sloth", "Trapjaw", "Armadon", "Nomad"];

        // Ez a függvény dönti el, hogy a véletlen koordináta a kék zónán belül van-e.
        // Mivel a térkép nem szabályos, százalékos határokat adunk meg (X és Y 0-100% között).
        function isValidSpawnArea(x, y) {
            // Kizárjuk a fekete/üres részeket a térkép szélein
            if (x < 10 || x > 90 || y < 10 || y > 95) return false; // Túl közel a szélekhez
            if (x < 25 && y < 35) return false; // Bal felső üres sarok
            if (x > 75 && y < 25) return false; // Jobb felső üres sarok
            if (x < 25 && y > 75) return false; // Bal alsó üres sarok
            if (x > 75 && y > 75) return false; // Jobb alsó üres sarok
            if (x > 50 && x < 70 && y > 70) return false; // Alsó-középső öböl / kivágás
            
            return true; // Ha nem esik a fenti "fekete" zónákba, akkor jó a hely!
        }

        function spawnCreatures() {
            const layer = document.getElementById("icon-layer");
            layer.innerHTML = ""; // Letöröljük a korábbi ikonokat

            let spawned = 0;

            // Addig generálunk, amíg pontosan 10 darab nem lesz a pályán
            while (spawned < 10) {
                // Véletlen százalékos pozíció generálása (0-100%)
                let randomX = Math.random() * 100;
                let randomY = Math.random() * 100;

                // Csak akkor rakjuk le, ha érvényes helyre esik a kék zónában
                if (isValidSpawnArea(randomX, randomY)) {
                    // Létrehozunk egy képet
                    let img = document.createElement("img");
                    img.src = "food.jpg";
                    img.className = "food-icon";
                    
                    // Pozicionálás százalékosan a térképen
                    img.style.left = randomX + "%";
                    img.style.top = randomY + "%";

                    // Véletlenszerű állatnév adása (ha fölé viszed az egeret, megmutatja)
                    let randomName = creatureNames[Math.floor(Math.random() * creatureNames.length)];
                    img.title = randomName + " (Élelem)";

                    // Hozzáadjuk a térképhez
                    layer.appendChild(img);
                    
                    spawned++; // Sikeres lerakás
                }
            }
        }
    </script>
</body>
</html>
