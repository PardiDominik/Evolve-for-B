<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolve Stage 2 - Taktikai Radar</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00ffcc;
            --accent-color: #ff3333;
            --bg-dark: #0a1118;
            --bg-panel: rgba(15, 25, 20, 0.8);
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #162b22 0%, #0a1118 100%);
            color: #e2f0e8;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: row; /* Egymás mellé teszi a térképet és a panelt */
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Bal oldal: Térkép szekció */
        .map-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--primary-glow);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
        }

        button {
            background: linear-gradient(45deg, transparent 10%, var(--accent-color) 10%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 0px 0px #b30000;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: linear-gradient(45deg, transparent 10%, #ff4d4d 10%);
            transform: translateX(-2px);
        }

        button:active {
            transform: translateX(2px);
            box-shadow: 0px 0px 0px transparent;
        }

        #map-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            border: 2px solid rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
        }

        #base-map {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 6px;
        }

        .food-icon {
            position: absolute;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
            cursor: crosshair;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 5;
        }

        .food-icon:hover, .food-icon.active {
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 0 15px var(--accent-color);
            border: 2px solid var(--accent-color);
        }

        /* Jobb oldal: Információs panel */
        .info-panel {
            width: 350px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border-left: 2px solid var(--primary-glow);
            padding: 30px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-placeholder {
            text-align: center;
            color: #5a7a6b;
            font-size: 1.2em;
            font-style: italic;
        }

        .creature-details {
            display: none; /* Alapból rejtett, csak hover esetén jelenik meg */
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        #info-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #00ffcc;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        #info-name {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.2em;
            color: var(--primary-glow);
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }

        #info-desc {
            font-size: 1.2em;
            color: #b0c4b8;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        #info-buff {
            font-weight: bold;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
            padding: 10px;
            border-left: 4px solid #ffd700;
            width: 100%;
            box-sizing: border-box;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="map-section">
        <h1>Shear - Taktikai Radar</h1>
        <button onclick="spawnCreatures()">Szkennelés Indítása</button>
        <div id="map-container">
            <img src="Alap_map.png" id="base-map" alt="Shear Map">
            <div id="icon-layer"></div>
        </div>
    </div>

    <div class="info-panel">
        <div id="placeholder-text" class="info-placeholder">
            [ Rendszer Készenlétben ]<br><br>Vidd az egeret egy célpontra az adatok lekéréséhez.
        </div>
        
        <div id="creature-data" class="creature-details">
            <!-- Itt jelenik meg a kép. Cseréld ki a fájlneveket majd a sajátjaidra a JS-ben! -->
            <img id="info-image" src="" alt="Lény képe">
            <h2 id="info-name">Lény Neve</h2>
            <p id="info-desc">Lény leírása...</p>
            <p id="info-buff">Elit Buff</p>
        </div>
    </div>

    <script>
        // Kibővített adatbázis a képek fájlneveivel
        const creatures = [
            {
                name: "Tyrant",
                desc: "Hatalmas, krokodilszerű csúcsragadozó, amely a folyókban és mocsarakban rejtőzik.",
                buff: "Elit Buff: Folyamatos életerő regeneráció",
                image: "tyrant.jpg" 
            },
            {
                name: "Megamouth",
                desc: "Félig a földbe ásva várja az áldozatát, kinézetre egy nagy sziklához hasonlít.",
                buff: "Elit Buff: Gyorsabb kasztképesség-töltődés",
                image: "megamouth.jpg"
            },
            {
                name: "Mammoth Bird",
                desc: "Nagy, madárszerű lény, amely veszély esetén elektromos mezőt hoz létre maga körül.",
                buff: "Elit Buff: Megnövelt fegyverváltási- és töltési sebesség",
                image: "mammoth_bird.jpg"
            },
            {
                name: "Sloth",
                desc: "Hatalmas, kétlábú, majomszerű lény. Lassú, de óriásit sebez, ha felbosszantják.",
                buff: "Elit Buff: Extra sebzés kiosztása",
                image: "sloth.jpg"
            },
            {
                name: "Trapjaw",
                desc: "Kutyaszerű, falkában vadászó ragadozók. Rendkívül gyorsak és agresszívek.",
                buff: "Könnyű Préda: Gyors táplálékszerzés a Szörny számára",
                image: "trapjaw.jpg"
            }
        ];

        // FIX HATSZÖG KOORDINÁTÁK (%)
        // Ezeket a pontokat úgy állítottam be, hogy a kék hatszögek közepére essenek.
        // Bármikor finomhangolhatod a számokat, vagy másolhatsz hozzá újakat!
        const validSpots = [
            {x: 45, y: 38}, {x: 52, y: 38}, {x: 37, y: 44}, {x: 45, y: 44}, 
            {x: 52, y: 44}, {x: 60, y: 44}, {x: 30, y: 50}, {x: 38, y: 50}, 
            {x: 45, y: 50}, {x: 52, y: 50}, {x: 60, y: 50}, {x: 68, y: 50},
            {x: 23, y: 55}, {x: 30, y: 55}, {x: 38, y: 55}, {x: 60, y: 55}, 
            {x: 68, y: 55}, {x: 75, y: 55}, {x: 15, y: 61}, {x: 23, y: 61},
            {x: 30, y: 61}, {x: 68, y: 61}, {x: 75, y: 61}, {x: 83, y: 61},
            {x: 15, y: 67}, {x: 23, y: 67}, {x: 75, y: 67}, {x: 83, y: 67},
            {x: 23, y: 73}, {x: 30, y: 73}, {x: 38, y: 73}, {x: 68, y: 73},
            {x: 75, y: 73}, {x: 38, y: 79}, {x: 45, y: 79}, {x: 52, y: 79}
        ];

        function spawnCreatures() {
            const layer = document.getElementById("icon-layer");
            layer.innerHTML = ""; 

            // Megkeverjük a koordinátákat, hogy mindig máshova kerüljenek
            let shuffledSpots = [...validSpots].sort(() => 0.5 - Math.random());
            
            // Kiválasztjuk az első 10-et
            let selectedSpots = shuffledSpots.slice(0, 10);

            selectedSpots.forEach(spot => {
                // Lény véletlenszerű kiválasztása
                let randomCreature = creatures[Math.floor(Math.random() * creatures.length)];

                let img = document.createElement("img");
                img.src = "food.png"; // A te ikonod
                img.className = "food-icon";
                img.style.left = spot.x + "%";
                img.style.top = spot.y + "%";

                // HOVER ESEMÉNY - Amikor rámész az egérrel
                img.addEventListener("mouseenter", () => {
                    document.getElementById("placeholder-text").style.display = "none";
                    document.getElementById("creature-data").style.display = "flex";
                    
                    document.getElementById("info-image").src = randomCreature.image;
                    document.getElementById("info-name").innerText = randomCreature.name;
                    document.getElementById("info-desc").innerText = randomCreature.desc;
                    document.getElementById("info-buff").innerText = randomCreature.buff;
                });

                // (Opcionális) Ha leveszed az egeret, visszaáll a készenléti szöveg
                img.addEventListener("mouseleave", () => {
                    document.getElementById("placeholder-text").style.display = "block";
                    document.getElementById("creature-data").style.display = "none";
                });

                layer.appendChild(img);
            });
        }
    </script>
</body>
</html>
